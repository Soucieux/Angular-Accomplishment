<mat-drawer-container class="sidenav-container" hasBackdrop="false">
	<mat-drawer mode="side" opened disableClose>
		<ul style="list-style-type: none; padding-left: 0px; display: flex; flex-direction: column">
			<li>
				<span class="nav-title">Menu</span>
			</li>
			<li style="padding-top: 5px">
				<a mat-button class="nav-button" matRipple routerLink="">
					<span class="material-symbols-outlined nav-icon">home</span>
					<span class="nav-label">Home</span>
				</a>
			</li>
			<li style="padding-top: 5px">
				<a mat-button class="nav-button" matRipple routerLink="/entertainment">
					<span class="material-symbols-outlined nav-icon">tv</span>
					<span class="nav-label">Entertainment</span>
				</a>
			</li>
			<!-- This is a placeholder to move the login/logout button to the bottom -->
			<li style="flex: 1 1 305px"></li>
			@if (currentUser$ | async; as user){
			<li
				[ngStyle]="{
					display: 'flex',
					flexDirection: 'row',
					padding: '10px',
				}">
				<button (click)="logout()" mat-mini-fab class="material-symbols-outlined login-logout-button">
					Logout
				</button>
				<p [ngStyle]="{ position: 'relative', top: '20px', fontSize: '18px' }">
					{{ user.displayName }}
				</p>
			</li>
			} @else {
			<li>
				<button
					(click)="login()"
					color="accent"
					mat-mini-fab
					class="material-symbols-outlined login-logout-button">
					Login
				</button>
			</li>
			}
		</ul>
	</mat-drawer>
	<mat-drawer-content>
		<router-outlet></router-outlet>
	</mat-drawer-content>
</mat-drawer-container>
