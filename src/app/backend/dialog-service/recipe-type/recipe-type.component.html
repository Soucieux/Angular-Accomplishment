<p-dialog
	[header]="ITYPE_DIALOG_TITLE"
	[(visible)]="visible"
	[modal]="true"
	[closable]="true"
	[resizable]="false"
	[style]="{ width: '500px', maxWidth: '92vw' }"
	styleClass="itype-dialog"
	appendTo="body"
	(onHide)="onDialogClosed()">

	<div class="itype-body">
		<div class="itype-counter" [class.at-cap]="!canAddMore()">
			<span class="material-symbols-outlined">category</span>
			{{ draft.size }} / {{ EDITOR_TYPE_MAX }} selected
		</div>
		<p class="itype-hint">Choose which ingredient types appear in the recipe editor. At least one must be selected.</p>
		<div class="itype-grid">
			@for (tab of masterTabs; track tab.id) {
				@let isSelected = draft.has(tab.id);
				@let isDisabled = !isSelected && !canAddMore();
				<button
					class="itype-card"
					[class]="tab.id"
					[class.selected]="isSelected"
					[class.at-cap]="isDisabled"
					[disabled]="isDisabled"
					(click)="toggleType(tab.id)">
					<span class="itype-emoji">{{ tab.emoji }}</span>
					<span class="itype-label">{{ tab.label }}</span>
					@if (isSelected) {
						<span class="itype-check material-symbols-outlined">check_circle</span>
					}
				</button>
			}
		</div>
	</div>

	<ng-template pTemplate="footer">
		<button class="dialog-cancel-btn" (click)="cancel()">Cancel</button>
		<button class="dialog-save-btn" (click)="apply()">Apply</button>
	</ng-template>
</p-dialog>
