<mat-drawer-container class="drawer-container" hasBackdrop="false">
	<mat-drawer mode="side" opened disableClose>
		<ul style="list-style-type: none; padding-left: 0px; display: flex; flex-direction: column">
			<li>
				<span class="nav-title hide-on-mobile">Menu</span>
			</li>
			<li style="padding-top: 5px">
				<a mat-button class="nav-button" matRipple routerLink="">
					<span class="material-icons nav-icon">home</span>
					<span class="nav-label hide-on-mobile">Home</span>
				</a>
			</li>
			<li style="padding-top: 5px">
				<a mat-button class="nav-button" matRipple routerLink="/entertainment">
					<span class="material-icons nav-icon">tv</span>
					<span class="nav-label hide-on-mobile">Entertainment</span>
				</a>
			</li>
			<li style="padding-top: 5px">
				<a mat-button class="nav-button" matRipple routerLink="/remainder">
					<span class="material-symbols-outlined nav-icon-mso">priority</span>
					<span class="nav-label hide-on-mobile">Remainder</span>
				</a>
			</li>
			<li style="padding-top: 5px">
				<a mat-button class="nav-button" matRipple routerLink="/patch">
					<span class="material-symbols-outlined nav-icon-mso">note_stack</span>
					<span class="nav-label hide-on-mobile">Patch Notes</span>
				</a>
			</li>
			<li style="padding-top: 5px">
				<a mat-button class="nav-button" matRipple routerLink="/about">
					<span class="material-symbols-outlined nav-icon-mso">info</span>
					<span class="nav-label hide-on-mobile">About</span>
				</a>
			</li>
			<!-- Each new button is about 40px in height -->
			<!-- This is a placeholder to move the signin page button to the bottom -->
			<li style="flex: 1 1 190px"></li>
			@if (currentUser$ | async; as user) {
				<li class="signout-button-container">
					<p-button
						(click)="logout()"
						icon="pi pi-user"
						[rounded]="true"
						severity="warn"
						class="signin-signout-button" />
					<p class="hide-on-mobile username">
						@if (isCN()) {
							{{ user.user_metadata.username }}
						} @else {
							{{ user.displayName ? user.displayName : '' }}
						}
					</p>
				</li>
			} @else {
				<li>
					<p-button
						routerLink="/login"
						icon="pi pi-user"
						[rounded]="true"
						severity="secondary"
						class="signin-signout-button" />
				</li>
			}
		</ul>
	</mat-drawer>
	<mat-drawer-content>
		<p-toast />
		<router-outlet></router-outlet>
	</mat-drawer-content>
</mat-drawer-container>
