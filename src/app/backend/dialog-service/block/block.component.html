<p-dialog
	[(visible)]="visible"
	[modal]="true"
	[closable]="false"
	[dismissableMask]="false"
	[appendTo]="'body'"
	(onHide)="onDialogClosed()"
	styleClass="blocking-dialog">
	<div class="blocking-content">
		<i class="pi pi-spin pi-spinner blocking-spinner"></i>
		<span class="blocking-message">{{ message }}</span>
	</div>
</p-dialog>
