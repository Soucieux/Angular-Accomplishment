<mat-drawer-container class="drawer-container" hasBackdrop="false">
	<mat-drawer mode="side" opened disableClose>
		<ul style="list-style-type: none; padding-left: 0px; display: flex; flex-direction: column">
			<li>
				<span class="nav-title hide-on-mobile">Menu</span>
			</li>
			<li style="padding-top: 5px">
				<a mat-button class="nav-button" matRipple routerLink="">
					<span class="material-icons nav-icon">home</span>
					<span class="nav-label hide-on-mobile">Home</span>
				</a>
			</li>
			<li style="padding-top: 5px">
				<a mat-button class="nav-button" matRipple routerLink="/entertainment">
					<span class="material-icons nav-icon">tv</span>
					<span class="nav-label hide-on-mobile">Entertainment</span>
				</a>
			</li>
			<!-- This is a placeholder to move the login/logout button to the bottom -->
			<li style="flex: 1 1 273px"></li>
			@if (currentUser$ | async; as user){
			<li class="logout-button-container">
				<button (click)="logout()" mat-mini-fab class="material-icons login-logout-button">
					logout
				</button>
				<p class="hide-on-mobile" [ngStyle]="{ position: 'relative', top: '20px', fontSize: '18px' }">
					{{ user.displayName }}
				</p>
			</li>
			} @else {
			<li class="login-button-container">
				<button
					(click)="login()"
					color="accent"
					mat-mini-fab
					class="material-icons login-logout-button">
					login
				</button>
			</li>
			}
		</ul>
	</mat-drawer>
	<mat-drawer-content>
		<router-outlet></router-outlet>
	</mat-drawer-content>
</mat-drawer-container>
