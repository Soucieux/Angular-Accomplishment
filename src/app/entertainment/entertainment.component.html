@if (isLoggedIn) {
<div class="control-button-container">
	<button mat-fab extended (click)="searchAllMovies()" class="control-button">
		<span class="material-symbols-outlined control-button-icon">search</span>
		<span class="control-button-label">Search All Movies</span>
	</button>
	<!-- TODO fix this for mobile -->
	<!-- <button mat-fab extended (click)="cancelSearch()" class="control-button">
		<span class="material-symbols-outlined control-button-icon">Cancel</span>
		<span class="control-button-label">Cancel Search</span>
	</button> -->
</div>
<div class="content-container">
	<div
		class="individual-item"
		[ngClass]="{
			'very-high-rate': movie.rate >= 9,
			'high-rate': movie.rate >= 7.9 && movie.rate < 9,
			'medium-rate': movie.rate >= 7 && movie.rate < 7.9,
			'low-rate': movie.rate < 7
		}"
		*ngFor="let movie of movieList$ | async">
		<div
			class="image-container"
			[ngStyle]="{ backgroundImage: 'url(' + movie.coverImageLink + ')' }"></div>
		<div class="individual-item-content">
			<div class="contents">
				<span class="title" [style.font-size]="calculateFontSize(movie.title.length)">
					{{ movie.title }}
				</span>
				<span class="text">类型：{{ movie.genre }} </span>
				<span class="text">集数：{{ movie.episodeNumber }}</span>
				<span class="text">年份：{{ movie.firstReleaseDate }}</span>
				<ng-container *ngIf="movie.rate; else noRate">
					<span class="rate">
						{{ movie.rate }}
					</span>
				</ng-container>
				<ng-template #noRate>
					<span class="rate">暂无评分</span>
				</ng-template>
			</div>
		</div>
	</div>
</div>
} @else {
<div class="access-denied-container">
	<h1>Access Denied</h1>
	<p>You do not have permission to access this page.</p>
</div>
}
