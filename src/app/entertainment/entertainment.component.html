@if (isLoggedIn) {
<div>
	<button mat-fab extended (click)="searchAllMovies()" class="search-button">
		<span class="material-symbols-outlined search-button-icon">search</span>
		<span class="search-button-label">Search All Movies</span>
	</button>
</div>
<div class="page-container">
	<div class="individual-item" *ngFor="let movie of movieList$ | async">
		<div
			class="image-container"
			[ngStyle]="{ backgroundImage: 'url(' + movie.coverImageLink + ')' }"></div>
		<div class="individual-item-content">
			<div class="contents title">
				<p [style.font-size]="calculateFontSize(movie.title.length)">
					{{ movie.title }}
				</p>
			</div>
			<div class="contents category">
				<div>
					{{ movie.genre }}
					<ng-container *ngIf="movie.rate; else noRate">
						<span class="rate">{{ movie.rate }}</span>
					</ng-container>
					<ng-template #noRate>
						<span>暂无评分</span>
					</ng-template>
				</div>
				<div>
					<span>{{ movie.year }}</span>
				</div>
			</div>
		</div>
	</div>
</div>
} @else {
<div class="access-denied-container">
	<h1>Access Denied</h1>
	<p>You do not have permission to access this page.</p>
</div>
}
