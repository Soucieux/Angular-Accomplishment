<div class="page-container">
	<div class="individual-item" *ngFor="let movie of movieList">
		<div class="individual-item-content">
			<div class="contents title">
				<p [style.font-size]="calculateFontSize(movie.name.length)">
					{{ movie.name }}
				</p>
			</div>
			<div class="contents category">
				<p>
					{{ movie.category }} <span class="rate">{{ movie.rate }}</span>
				</p>
			</div>
		</div>
