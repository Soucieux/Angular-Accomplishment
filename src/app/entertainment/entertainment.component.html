<div class="tvShow-container">
	<div *ngFor="let tvShow of tvShowsList">
		<div class="container">
			<div class="overlay">
				<div class="items head">
					<p>{{ tvShow.name }}</p>
				</div>
				<div class="items category">
					<p>{{ tvShow.category }}</p>
				</div>
			</div>
		</div>
	</div>
</div>
