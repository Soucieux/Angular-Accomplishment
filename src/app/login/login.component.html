<div class="container">
	<div class="word-container">
		<div>
			<h1 class="title">VISION CANVAS</h1>
		</div>
		<div>
			<h2 class="word">恭喜你找到了非常隐秘的小树洞</h2>
			<h5 class="en-word">Welcome to the very hidden kingdom</h5>
		</div>
		<div>
			<h2 class="word">一个可以回到过去的神秘领域</h2>
			<h5 class="en-word">a mysterious place where you can go back in time</h5>
		</div>
	</div>
	<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
		<div class="input-field-container field-container">
			<p-iftalabel>
				<input
					class="input-field"
					pInputText
					type="text"
					id="email"
					formControlName="email"
					[invalid]="isInvalid('email')" />
				<label for="email">Email</label>
				@if (isInvalid('email')) {
				<p-message severity="error" size="small" variant="simple">Email is required.</p-message>
				}
			</p-iftalabel>
		</div>
		<div class="input-field-container field-container">
			<p-iftalabel>
				<input
					class="input-field"
					pInputText
					type="password"
					id="password"
					formControlName="password"
					[invalid]="isInvalid('password')" />
				<label for="password">Password</label>
				@if (isInvalid('password')) { @if (loginForm.get('password')?.errors?.['required']) {
				<p-message severity="error" size="small" variant="simple">Password is required.</p-message>
				} }
			</p-iftalabel>
		</div>
		<div class="field-container">
			<button class="login-button" pButton severity="secondary" type="submit">
				<span pButtonLabel>Submit</span>
			</button>
		</div>
		<div class="field-container"><hr class="horizontal-line" /></div>
		<p-button
			(click)="googleLogin()"
			icon="pi pi-google"
			[rounded]="true"
			severity="secondary"
			class="field-container"></p-button>
	</form>
</div>
