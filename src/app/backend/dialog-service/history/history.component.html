<p-dialog
	header="Activities"
	[(visible)]="visible"
	[modal]="true"
	[appendTo]="'body'"
	[resizable]="false"
	styleClass="history-dialog"
	(onHide)="onDialogClosed()">
	<p class="history-subtitle">Click on a deleted entry to recover it</p>
	<div class="dialog-content">
		@for(entry of entries$ | async; track entry.key){
		<div class="entry-row">
			<div
				class="icon-badge"
				[ngClass]="{
					'badge-search': entry.status === 'search',
					'badge-added': entry.status === 'added',
					'badge-deleted': entry.status === 'deleted'
				}">
				<span class="material-icons badge-icon">
					@if(entry.status === 'search'){ search }
					@else if(entry.status === 'added'){ add }
					@else if(entry.status === 'deleted'){ cancel }
				</span>
			</div>
			<p
				class="message"
				[class.message-deleted]="entry.status === 'deleted'"
				(click)="entry.status === 'deleted' ? onMessageClick(entry) : null">
				{{ entry.message }}
			</p>
		</div>
		}
	</div>
</p-dialog>
<ng-container #dialogComponentContainer></ng-container>
