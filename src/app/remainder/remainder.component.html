<div class="container">
	<p-table [value]="updatedRows" class="no-gap-table">
		<ng-template pTemplate="header">
			<tr>
				<th class="header">First</th>
				<th class="header">Second</th>
				<th class="header">Third</th>
				<th class="header">Fourth</th>
			</tr>
		</ng-template>
		<ng-template pTemplate="body" let-row let-rowIndex="rowIndex">
			<tr>
				<td class="data">
					<input
						pInputText
						type="text"
						inputmode="numeric"
						[(ngModel)]="row.first"
						[disabled]="isDisabled(rowIndex, 'first')"
						[class.disabled-cell]="isDisabled(rowIndex, 'first')"
						class="input"
						(keydown)="onNumberChange($event)"
						(blur)="onValueChange(rowIndex, 'first')"
						(keyup.enter)="onValueChange(rowIndex, 'first')" />
				</td>
				<td class="data">
					<input
						pInputText
						type="text"
						inputmode="numeric"
						[(ngModel)]="row.second"
						[disabled]="isDisabled(rowIndex, 'second')"
						[class.disabled-cell]="isDisabled(rowIndex, 'second')"
						class="input"
						(keydown)="onNumberChange($event)"
						(blur)="onValueChange(rowIndex, 'second')"
						(keyup.enter)="onValueChange(rowIndex, 'second')" />
				</td>
				<td class="data">
					<input
						pInputText
						type="text"
						inputmode="numeric"
						[(ngModel)]="row.third"
						[disabled]="isDisabled(rowIndex, 'third')"
						[class.disabled-cell]="isDisabled(rowIndex, 'third')"
						class="input"
						(keydown)="onNumberChange($event)"
						(blur)="onValueChange(rowIndex, 'third')"
						(keyup.enter)="onValueChange(rowIndex, 'third')" />
				</td>
				<td class="data">
					<input
						pInputText
						type="text"
						inputmode="numeric"
						[(ngModel)]="row.fourth"
						[disabled]="isDisabled(rowIndex, 'fourth')"
						[class.disabled-cell]="isDisabled(rowIndex, 'fourth')"
						class="input"
						(keydown)="onNumberChange($event)"
						(blur)="onValueChange(rowIndex, 'fourth')"
						(keyup.enter)="onValueChange(rowIndex, 'fourth')" />
				</td>
			</tr>
		</ng-template>
		<ng-template pTemplate="footer">
			<tr>
				<td colspan="4" class="reset">
					<p-button styleClass="button" label="Reset" icon="pi pi-undo" [severity]="'secondary'">
					</p-button>
				</td>
			</tr>
		</ng-template>
	</p-table>
</div>
