<div class="container">
	<p-table [value]="updatedFirstRows" [loading]="loading" [showLoader]="false" class="first-table">
		<ng-template pTemplate="header">
			<tr>
				<th class="header">First</th>
				<th class="header">Second</th>
				<th class="header">Third</th>
				<th class="header">Fourth</th>
			</tr>
		</ng-template>
		<ng-template pTemplate="loadingbody">
			@for(_ of [0,1,2,3,4];track $index){
			<tr>
				<td class="skeleton-row"><p-skeleton /></td>
				<td class="skeleton-row"><p-skeleton /></td>
				<td class="skeleton-row"><p-skeleton /></td>
				<td class="skeleton-row"><p-skeleton /></td>
			</tr>
			}
		</ng-template>
		<ng-template pTemplate="body" let-row let-rowIndex="rowIndex">
			<tr>
				<td class="data">
					<input
						pInputText
						type="text"
						inputmode="numeric"
						[(ngModel)]="row.first"
						[disabled]="isDisabled(rowIndex, this.fields[0])"
						[class.disabled-cell]="isDisabled(rowIndex, this.fields[0])"
						class="input"
						(keydown)="onNumberChange($event)"
						(blur)="onValueChange(rowIndex, this.fields[0])"
						(keyup.enter)="onValueChange(rowIndex, this.fields[0])" />
				</td>
				<td class="data">
					<input
						pInputText
						type="text"
						inputmode="numeric"
						[(ngModel)]="row.second"
						[disabled]="isDisabled(rowIndex, this.fields[1])"
						[class.disabled-cell]="isDisabled(rowIndex, this.fields[1])"
						class="input"
						(keydown)="onNumberChange($event)"
						(blur)="onValueChange(rowIndex, this.fields[1])"
						(keyup.enter)="onValueChange(rowIndex, this.fields[1])" />
				</td>
				<td class="data">
					<input
						pInputText
						type="text"
						inputmode="numeric"
						[(ngModel)]="row.third"
						[disabled]="isDisabled(rowIndex, this.fields[2])"
						[class.disabled-cell]="isDisabled(rowIndex, this.fields[2])"
						class="input"
						(keydown)="onNumberChange($event)"
						(blur)="onValueChange(rowIndex, this.fields[2])"
						(keyup.enter)="onValueChange(rowIndex, this.fields[2])" />
				</td>
				<td class="data">
					<input
						pInputText
						type="text"
						inputmode="numeric"
						[(ngModel)]="row.fourth"
						[disabled]="isDisabled(rowIndex, this.fields[3])"
						[class.disabled-cell]="isDisabled(rowIndex, this.fields[3])"
						class="input"
						(keydown)="onNumberChange($event)"
						(blur)="onValueChange(rowIndex, this.fields[3])"
						(keyup.enter)="onValueChange(rowIndex, this.fields[3])" />
				</td>
			</tr>
		</ng-template>
		<ng-template pTemplate="footer">
			<tr>
				<td colspan="4" class="reset">
					<p-button styleClass="button" label="Reset" icon="pi pi-undo" [severity]="'secondary'">
					</p-button>
				</td>
			</tr>
		</ng-template>
	</p-table>
	<div class="second-table">
		@for(item of secondRows; track item.key){
		<div class="second-table-cell">
			<div class="second-table-header">{{ item.key }}</div>
			<p-inputgroup>
				<p-inputGroupAddon> <i class="pi pi-dollar"></i></p-inputGroupAddon>
				<p-inputnumber
					mode="decimal"
					locale="en-US"
					[minFractionDigits]="2"
					[maxFractionDigits]="2"
					[step]="0.01"
					[(ngModel)]="item.value.debt" />
			</p-inputgroup>
			<p-datepicker
				class="second-table-date"
				[appendTo]="'body'"
				dateFormat="yy-mm-dd"
				[(ngModel)]="item.value.date" />
		</div>
		}
	</div>
</div>
