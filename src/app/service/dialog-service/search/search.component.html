<p-dialog
	header="Searching latest rate for each movie..."
	[(visible)]="visible"
	[modal]="true"
	[appendTo]="'body'"
	[resizable]="false"
	[closable]="false"
	styleClass="dialog"
	(onHide)="onDialogClosed()">
	<div class="logs">
		@for (searchLog of searchLogs; track $index) {
		<div>{{ searchLog }}</div>
		}
	</div>
	<ng-template #footer>
		<p-button
			label="STOP"
			type="button"
			class="submit-button"
			severity="danger"
			(click)="triggerStopSearching()"></p-button> </ng-template
></p-dialog>
