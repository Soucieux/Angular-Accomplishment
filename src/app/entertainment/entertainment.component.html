@if (isLoggedIn) {
<div>
	<button (click)="searchAllMovies()">Search All Movies</button>
</div>
<div class="page-container">
	<div class="individual-item" *ngFor="let movie of movieList$ | async">
		<div
			class="image-container"
			[ngStyle]="{ backgroundImage: 'url(' + movie.coverImageLink + ')' }"></div>
		<div class="individual-item-content">
			<div class="contents title">
				<p [style.font-size]="calculateFontSize(movie.title.length)">
					{{ movie.title }}
				</p>
			</div>
			<div class="contents category">
				<p>
					{{ movie.genre }} <span class="rate">{{ movie.rate }}</span>
				</p>
			</div>
		</div>
	</div>
</div>
} @else {
<div class="access-denied-container">
	<h1>Access Denied</h1>
	<p>You do not have permission to access this page.</p>
</div>
}
